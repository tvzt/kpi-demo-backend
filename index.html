<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard de Ventas - Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #10141c;
    --panel: #171d29;
    --border: #262f42;
    --text: #e7ecf5;
    --muted: #8b96ab;
    --accent: #4fd1c5;
    --accent2: #f2a65a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px 24px 64px;
  }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 14px; margin: 0 0 28px; }
  .status {
    display: inline-block;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .status.ok { background: rgba(79,209,197,0.15); color: var(--accent); }
  .status.err { background: rgba(240,90,90,0.15); color: #f05a5a; }

  .kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .kpi {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }
  .kpi .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .kpi .value { font-size: 26px; font-weight: 700; margin-top: 6px; }

  .charts {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
  }
  @media (max-width: 800px) { .charts { grid-template-columns: 1fr; } }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }
  .panel h2 { font-size: 14px; color: var(--muted); font-weight: 600; margin: 0 0 12px; }
  canvas { max-height: 280px; }

  #login-screen {
    max-width: 340px;
    margin: 80px auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
  }
  #login-screen h2 { margin: 0 0 6px; font-size: 18px; }
  #login-screen p { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
  #login-screen input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #0d1119;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 12px;
    box-sizing: border-box;
  }
  #login-screen button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #0d1119;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  #login-screen button:disabled { opacity: 0.6; cursor: default; }
  #login-error { color: #f05a5a; font-size: 13px; margin-top: 10px; min-height: 16px; }
  #dashboard { display: none; }
</style>
</head>
<body>

  <div id="login-screen">
    <h2>Dashboard de Ventas</h2>
    <p>Ingresá la clave de acceso</p>
    <input type="password" id="password-input" placeholder="Clave" autocomplete="current-password">
    <button id="login-btn" onclick="intentarLogin()">Entrar</button>
    <div id="login-error"></div>
  </div>

  <div id="dashboard">
  <h1>Dashboard de Ventas</h1>
  <p class="subtitle">Datos servidos en tiempo real desde la API — nada queda embebido en este HTML</p>
  <div id="status" class="status">Conectando con el servidor...</div>

  <div class="kpis" id="kpis">
    <div class="kpi"><div class="label">Ventas totales</div><div class="value" id="k-total">—</div></div>
    <div class="kpi"><div class="label">Operaciones</div><div class="value" id="k-ops">—</div></div>
    <div class="kpi"><div class="label">Ticket promedio</div><div class="value" id="k-ticket">—</div></div>
    <div class="kpi"><div class="label">Unidades vendidas</div><div class="value" id="k-unid">—</div></div>
  </div>

  <div class="charts">
    <div class="panel">
      <h2>Ventas por mes</h2>
      <canvas id="chartMes"></canvas>
    </div>
    <div class="panel">
      <h2>Ventas por categoría</h2>
      <canvas id="chartCategoria"></canvas>
    </div>
  </div>
  </div>

<script>
  // ⚠️ Único lugar que hay que editar al desplegar: la URL de tu API en Render.
  const API_URL = "http://localhost:8000"; // reemplazar por https://TU-BACKEND.onrender.com

  const fmtMoneda = (n) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(n);
  const fmtNum = (n) => new Intl.NumberFormat('es-AR').format(n);

  // El token vive solo en memoria de esta pestaña (sessionStorage).
  // Se pierde al cerrar la pestaña: hay que loguearse de nuevo cada vez.
  // Nunca queda escrito en el HTML ni en el código fuente.
  function getToken() { return sessionStorage.getItem('dashboard_token'); }
  function setToken(t) { sessionStorage.setItem('dashboard_token', t); }
  function clearToken() { sessionStorage.removeItem('dashboard_token'); }

  async function intentarLogin() {
    const input = document.getElementById('password-input');
    const btn = document.getElementById('login-btn');
    const errorEl = document.getElementById('login-error');
    const clave = input.value;

    if (!clave) { errorEl.textContent = 'Ingresá una clave.'; return; }

    btn.disabled = true;
    btn.textContent = 'Verificando...';
    errorEl.textContent = '';

    try {
      const res = await fetch(`${API_URL}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: clave }),
      });

      if (!res.ok) {
        errorEl.textContent = 'Clave incorrecta.';
        btn.disabled = false;
        btn.textContent = 'Entrar';
        return;
      }

      const data = await res.json();
      setToken(data.token);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      cargarDashboard();

    } catch (err) {
      errorEl.textContent = 'No se pudo conectar con el servidor.';
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  // Permite tocar Enter en vez de clickear el botón
  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('password-input');
    if (input) {
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') intentarLogin(); });
    }
    // Si ya había un token de esta sesión, salteamos el login
    if (getToken()) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      cargarDashboard();
    }
  });

  async function fetchProtegido(path) {
    const res = await fetch(`${API_URL}${path}`, {
      headers: { 'Authorization': `Bearer ${getToken()}` },
    });
    if (res.status === 401) {
      // Token vencido o inválido: volvemos a pedir la clave.
      clearToken();
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login-screen').style.display = 'block';
      document.getElementById('login-error').textContent = 'Tu sesión expiró, ingresá la clave de nuevo.';
      throw new Error('No autorizado');
    }
    return res.json();
  }

  async function cargarDashboard() {
    const statusEl = document.getElementById('status');
    try {
      const [kpis, porMes, porCategoria] = await Promise.all([
        fetchProtegido('/api/kpis'),
        fetchProtegido('/api/ventas-por-mes'),
        fetchProtegido('/api/ventas-por-categoria'),
      ]);

      statusEl.textContent = "Conectado ✓";
      statusEl.className = "status ok";

      document.getElementById('k-total').textContent = fmtMoneda(kpis.ventas_totales);
      document.getElementById('k-ops').textContent = fmtNum(kpis.cantidad_operaciones);
      document.getElementById('k-ticket').textContent = fmtMoneda(kpis.ticket_promedio);
      document.getElementById('k-unid').textContent = fmtNum(kpis.unidades_vendidas);

      // Los graficos se intentan aparte: si Chart.js no cargo (CDN bloqueado),
      // los KPIs ya mostrados arriba no se ven afectados por este error.
      try {
        if (typeof Chart === 'undefined') {
          throw new Error('La libreria Chart.js no cargo desde el CDN');
        }

        new Chart(document.getElementById('chartMes'), {
          type: 'line',
          data: {
            labels: porMes.map(d => d.mes),
            datasets: [{
              label: 'Ventas',
              data: porMes.map(d => d.monto),
              borderColor: '#4fd1c5',
              backgroundColor: 'rgba(79,209,197,0.15)',
              fill: true,
              tension: 0.3,
            }]
          },
          options: {
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: '#8b96ab' }, grid: { color: '#262f42' } },
              y: { ticks: { color: '#8b96ab' }, grid: { color: '#262f42' } }
            }
          }
        });

        new Chart(document.getElementById('chartCategoria'), {
          type: 'doughnut',
          data: {
            labels: porCategoria.map(d => d.categoria),
            datasets: [{
              data: porCategoria.map(d => d.monto),
              backgroundColor: ['#4fd1c5', '#f2a65a', '#8b7ed8', '#e37fa0', '#7fb8e3'],
              borderWidth: 0,
            }]
          },
          options: {
            plugins: { legend: { position: 'bottom', labels: { color: '#e7ecf5', boxWidth: 12 } } }
          }
        });
      } catch (chartErr) {
        console.error('Error al graficar:', chartErr);
        document.getElementById('chartMes').replaceWith(document.createTextNode('No se pudieron cargar los graficos (CDN bloqueado).'));
      }

    } catch (err) {
      statusEl.textContent = "No se pudo conectar con la API (" + err.message + ")";
      statusEl.className = "status err";
      console.error(err);
    }
  }

  cargarDashboard();
</script>
</body>
</html>
